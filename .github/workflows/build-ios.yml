name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Archive
    runs-on: macos-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'
    
    - name: Show Xcode Version
      run: xcodebuild -version
    
    - name: Install Dependencies
      run: |
        # Если используете CocoaPods
        # pod install
        echo "No dependencies to install"
    
    - name: Build Project
      run: |
        xcodebuild clean build \
          -project BluetoothMessengerIOS.xcodeproj \
          -scheme BluetoothMessengerIOS \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Create Archive
      run: |
        xcodebuild archive \
          -project BluetoothMessengerIOS.xcodeproj \
          -scheme BluetoothMessengerIOS \
          -configuration Release \
          -archivePath $PWD/build/BluetoothMessengerIOS.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Create ExportOptions.plist
      run: |
        cat > ExportOptions.plist <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>development</string>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
        </dict>
        </plist>
        EOF
    
    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath $PWD/build/BluetoothMessengerIOS.xcarchive \
          -exportPath $PWD/build \
          -exportOptionsPlist ExportOptions.plist \
          -allowProvisioningUpdates
      continue-on-error: true
    
    - name: List Build Directory
      run: |
        echo "Build directory contents:"
        ls -la build/
        if [ -d "build/BluetoothMessengerIOS.xcarchive" ]; then
          echo "Archive contents:"
          ls -la build/BluetoothMessengerIOS.xcarchive/Products/Applications/
        fi
    
    - name: Upload Archive
      uses: actions/upload-artifact@v4
      with:
        name: BluetoothMessengerIOS-Archive
        path: build/BluetoothMessengerIOS.xcarchive
        retention-days: 7
    
    - name: Upload IPA (if exists)
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: BluetoothMessengerIOS-IPA
        path: build/*.ipa
        retention-days: 7
      continue-on-error: true
    
    - name: Upload App Bundle
      uses: actions/upload-artifact@v4
      with:
        name: BluetoothMessengerIOS-App
        path: build/BluetoothMessengerIOS.xcarchive/Products/Applications/*.app
        retention-days: 7
      continue-on-error: true

  # Опциональный job для создания release
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: BluetoothMessengerIOS-IPA
        path: ./artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./artifacts/*.ipa
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
